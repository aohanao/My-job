version: '3.8'

services:
  cae_agent:
    build: .
    container_name: cae_agent_instance
    environment:
      # 如果你在本机的 Docker 中运行，但想连宿主机系统的 RAG，可以将 URL 设为 host.docker.internal
      # - RAG_SSE_URL=http://host.docker.internal:8000/sse
      - TOOL_BACKEND=local
    volumes:
      # 挂载 session 文件夹以实现本地持久化
      - ./sessions:/app/sessions
      - ./.data:/app/.data
      # (可选) 如果你需要在宿主机运行 Abaqus，可以通过 volume/网络代理，但这需要根据 Abaqus API 适配
      # - /path/to/host/abaqus_workspace:/app/sandbox
    stdin_open: true # 对于 CLI 程序 main.py 这是必须要能够接收 input() 的设置
    tty: true
